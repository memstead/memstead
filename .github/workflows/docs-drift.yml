# Drift-check for the deterministic API-docs Markdown tree.
#
# Regenerates `docs-site/src/content/docs/reference/*` from the live MCP,
# CLI, UniFFI, and engine sources via `cargo run -p xtask -- generate-docs`
# and fails when the regenerated bytes differ from what's committed. This
# is what backs the AC complements that refuse to merge PRs touching any
# of the four surfaces without a regenerated artefact: the xtask output
# is byte-stable on identical source, so a non-empty diff is always a
# surface change that the contributor forgot to regenerate.
#
# The job runs independently of `lean-smoke` and `full-smoke` so a broken
# extractor does not gate engine-only PRs that touched no surface.

name: Docs drift check

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docs-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-check:
    name: Regenerate and diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target

      # Regenerates the open-surface references (MCP, CLI, UniFFI, WASM,
      # parity, errors, binding format). The Registry HTTP reference (`registry.md` +
      # `openapi.json`) is committed-static here — it documents a public
      # HTTP API and is regenerated by the registry service's own tooling,
      # not the open xtask; `write_if_changed` leaves it untouched so it
      # does not perturb this drift check.
      - name: Regenerate API docs
        run: cargo run -p xtask -- generate-docs --output docs-site/src/content/docs/reference

      - name: Diff committed output
        run: |
          if ! git diff --exit-code docs-site/src/content/docs/reference; then
            echo "::error::API docs in docs-site/src/content/docs/reference are out of date."
            echo "::error::Run \`cargo run -p xtask -- generate-docs --output docs-site/src/content/docs/reference\` and commit the result."
            exit 1
          fi
