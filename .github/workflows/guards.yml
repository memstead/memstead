# Agent-facing-surface guards. These scan *public* content, so the real
# exposure is external PRs to this repo — which the private workspace's
# CI never sees. Each script defines its own patterns; this workflow only
# wires them in. Both are blocking gates.
#
# check-no-plan-refs.sh: no decision-trail reference (plan-file paths,
# "Plan N of …", probe finding numbers) may leak into user-facing CLI
# `--help` or MCP tool/param descriptions.
#
# check-no-mechanism-leak.sh: no implementation mechanism (internal
# storage paths, library identities, internal ref names) may leak into
# agent-facing MCP descriptions or clap-rendered CLI help. Run it locally
# before touching MCP tool descriptions or CLI arg docs.

name: Guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: guards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-surface-guards:
    name: No plan-refs or mechanism leaks in agent-facing text
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: No decision-trail references
        run: ./scripts/check-no-plan-refs.sh
      - name: No implementation-mechanism leaks
        run: ./scripts/check-no-mechanism-leak.sh
