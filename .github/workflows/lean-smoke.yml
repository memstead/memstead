# Lean-build CI smoke. Builds the lean flavour of `memstead` and
# `memstead-mcp` (no `mem-repo` feature, no `gix`, no `memstead-git-branch`)
# and exercises three end-to-end probes against the binaries:
#
#   * `lean_smoke`        — happy-path round-trip (create → search →
#                            entity read; changelog row inspected).
#   * `lean_strictness`   — schema-strictness probes (UNKNOWN_SECTION,
#                            INVALID_ENUM_VALUE, MISSING_REQUIRED_SECTION
#                            warning).
#   * `lean_mutation`     — update / relate / delete with hash
#                            round-trip and HASH_MISMATCH rejection.
#
# All three jobs share a `cargo build --release --no-default-features`
# step. The probe scripts live under `ci/` so the same probes can
# be replayed locally with the binaries built by hand.
#
# The `cargo` step is wired with sccache through the
# `Swatinem/rust-cache` action so warm CI runs reuse the prior crate
# graph; the lean build is intentionally smaller than the full one
# (no `gix`) so the cold-start cost is bounded.
name: Lean smoke

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid stacking concurrent runs on the same ref. New pushes cancel
# in-flight runs of the same ref.
concurrency:
  group: lean-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The build step is its own job so the three probe jobs can each
  # download the produced binaries via `actions/upload-artifact`
  # without re-paying the build cost. This also makes a build break
  # observable as a single failed job rather than triplicated across
  # the probes.
  build-lean:
    name: Build lean binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target

      - name: Build lean (no-default-features)
        run: cargo build -p memstead-cli -p memstead-mcp --release --no-default-features

      - name: Verify dep tree carries no gix or memstead-git-branch
        run: |
          # `cargo tree -e normal` excludes dev-deps, so the assertion
          # is on the actual link-time graph for the binaries.
          if cargo tree -p memstead-cli --no-default-features -e normal | grep -E "^[└├]── (gix|memstead-git-branch) "; then
            echo "::error::lean memstead-cli unexpectedly carries gix or memstead-git-branch as a normal dep"
            exit 1
          fi
          if cargo tree -p memstead-mcp --no-default-features -e normal | grep -E "^[└├]── (gix|memstead-git-branch) "; then
            echo "::error::lean memstead-mcp unexpectedly carries gix or memstead-git-branch as a normal dep"
            exit 1
          fi

      - name: Upload lean binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lean-binaries
          path: |
            target/release/memstead
            target/release/memstead-mcp
          retention-days: 1

  smoke:
    name: Lean smoke (happy path)
    needs: build-lean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: lean-binaries
          path: bin
      - name: Make binaries executable
        run: chmod +x bin/memstead bin/memstead-mcp
      - name: Run lean smoke
        run: |
          python3 ci/lean_smoke.py \
            --memstead "$(pwd)/bin/memstead" \
            --memstead-mcp "$(pwd)/bin/memstead-mcp"

  strictness:
    name: Lean strictness probes
    needs: build-lean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: lean-binaries
          path: bin
      - name: Make binaries executable
        run: chmod +x bin/memstead bin/memstead-mcp
      - name: Run lean strictness probes
        run: |
          python3 ci/lean_strictness.py \
            --memstead "$(pwd)/bin/memstead" \
            --memstead-mcp "$(pwd)/bin/memstead-mcp"

  mutation:
    name: Lean mutation surface
    needs: build-lean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: lean-binaries
          path: bin
      - name: Make binaries executable
        run: chmod +x bin/memstead bin/memstead-mcp
      - name: Run lean mutation probes
        run: |
          python3 ci/lean_mutation.py \
            --memstead "$(pwd)/bin/memstead" \
            --memstead-mcp "$(pwd)/bin/memstead-mcp"
