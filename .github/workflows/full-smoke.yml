# Full-build CI smoke. Builds the full flavour of `memstead` and `memstead-mcp`
# (`--features mem-repo`, links `gix` and `memstead-git-branch`) and
# exercises the full mutation surface against a mem-repo workspace
# bootstrapped via `memstead mem-repo init` + `memstead mem init`.
#
# Sister workflow to `lean-smoke.yml`: same harness
# (`ci/mcp_client.py`), same shape (build → upload → probe), but
# the workspace setup uses the gitdir-backed mem-repo path and the
# probe asserts the 14-tool full surface (`memstead_mem_create`,
# `memstead_mem_delete`, `memstead_reload` are full-only).
#
# Why a separate workflow rather than a matrix dimension on
# `lean-smoke.yml`: the build artefacts are different (lean vs full
# binaries link different deps), the workspace setup differs, and a
# lean-smoke regression should not be hidden by a full-smoke success
# (or vice versa). Keeping them as siblings means each failure mode
# shows up as its own red check.
name: Full smoke

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: full-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-full:
    name: Build full binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
          # Distinct cache key from `lean-smoke.yml` so the lean
          # build's cache (no gix, smaller dep graph) doesn't shadow
          # the full build's hot path. The two flavours pull different
          # crate sets so sharing the cache wouldn't help anyway.
          shared-key: full-build

      # `memstead-cli` / `memstead-mcp` build the full multi-mem flavour
      # by default (the `mem-repo` feature is on by default) and produce
      # the `memstead` / `memstead-mcp` binaries. `--no-default-features`
      # would yield the lean build (exercised by `lean-smoke.yml`).
      - name: Build full
        run: cargo build -p memstead-cli -p memstead-mcp --release

      - name: Upload full binaries
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: full-binaries
          path: |
            target/release/memstead
            target/release/memstead-mcp
          retention-days: 1

  smoke:
    name: Full smoke (mem-repo round-trip)
    needs: build-full
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: full-binaries
          path: bin
      - name: Make binaries executable
        run: chmod +x bin/memstead bin/memstead-mcp
      - name: Run full smoke
        # `memstead mem init` spawns `memstead-mcp`; pass the path through
        # `MEMSTEAD_MCP_BIN` so the spawn finds the right binary
        # without a system-wide install. The probe sets this env var
        # itself, but a sibling test that bypasses it would surface
        # the same `MEMSTEAD_MCP_BIN` requirement.
        run: |
          python3 ci/full_smoke.py \
            --memstead "$(pwd)/bin/memstead" \
            --memstead-mcp "$(pwd)/bin/memstead-mcp"
