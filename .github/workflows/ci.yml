# The engine gate — every push and PR runs the complete test surface
# (both flavours + true-lean CLI + plugin suites via run-tests.sh, the
# same script developers run locally), the lint gates (clippy
# -D warnings in both flavours, rustfmt), and a RustSec advisory audit.
# A failing test, warning, format diff, or advisory turns the build red.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Full test surface (run-tests.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - name: Install cargo-nextest
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2
        with:
          tool: cargo-nextest
      - name: Run the full test surface
        run: ./run-tests.sh

  lint:
    name: Clippy + rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      - name: Clippy (full flavour)
        run: cargo clippy --workspace --all-targets --features mem-repo -- -D warnings
      - name: Clippy (lean flavour)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - name: rustfmt
        run: cargo fmt --check

  wasm:
    name: wasm32 dependency gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install stable toolchain (wasm32 target)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target
      # memstead-wasm pulls memstead-base with default-features off; the
      # ingest/pipeline modules sit ungated in that closure. A wasm-breaking
      # addition there is otherwise caught only at npm publish time.
      - name: Check memstead-wasm builds for wasm32
        run: cargo check --target wasm32-unknown-unknown -p memstead-wasm

  audit:
    name: RustSec advisories
    runs-on: ubuntu-latest
    # The action reports via the Checks API on top of failing the job.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
