# Keep the three dependency trees current: the Rust workspace, the
# pinned GitHub Actions SHAs, and the docs-site npm tree. Weekly
# batches — pre-release, review bandwidth beats freshness.
#
# Grouped: semver-compatible bumps land as one PR per ecosystem;
# majors stay separate so breaking changes get individual review.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-compatible:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        update-types:
          - minor
          - patch
    # release.yml is generated by cargo-dist and guarded by the `plan`
    # job — hand edits are rejected, so dependabot must not touch the
    # actions pinned there. They update when cargo-dist is updated.
    # checkout also appears in hand-maintained workflows; its SHA pins
    # are maintained manually for the same reason.
    ignore:
      - dependency-name: actions/checkout
      - dependency-name: actions/upload-artifact
      - dependency-name: actions/download-artifact
      - dependency-name: actions/attest-build-provenance

  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-compatible:
        update-types:
          - minor
          - patch
