# yaml-language-server: $schema=../../../../engine/crates/memstead-schema/generated/type-definition.schema.json

name: tool
description: |
  A callable capability available to an agent program. Catalog entry
  declaring inputs, outputs, error codes, and cost. Nodes link to a
  tool via the uses edge to declare it as part of their action space.
when_to_use: |
  Use for every external capability the program calls — MCP tools,
  shell commands, internal helpers, sub-agents. Author one tool entity
  per distinct capability; if the same MCP tool is used by many
  programs, share the entity via cross-mem reference rather than
  duplicating.
boundaries:
  - Not a node — a tool is what gets called; a node is the call site.
  - Not a constraint — constraints are rules; tools are capabilities.
  - Not an output — tools produce outputs; the output schema lives in
    the outputs section, not as a separate entity.
  - Not a sub-program — sub-programs compose via PART_OF; a tool is a
    leaf capability the program does not own.
system_message: |
  A tool entity is the agent's compile-time view of a capability. It
  declares the name the agent calls (mcp_tool or shell_command), the
  input parameters it accepts, the outputs it produces, the typed
  error codes it can emit, and a cost hint so the agent can prefer
  cheap tools over expensive ones when both would work.

  The agent reads a tool entity to understand what it can do, not how
  to invoke it line-by-line. Exact param values come from the calling
  node's intent.
sections:
  - key: description
    heading: Description
    required: true
    search_weight: 40.0
    write_rules:
      - "One to three sentences. What the tool does. Standalone-readable in a search snippet — an agent searching the catalog should know whether to consider this tool from the description alone."
  - key: inputs
    heading: Inputs
    required: true
    search_weight: 20.0
    write_rules:
      - "Parameter list. For each parameter: name, type, required/optional, default, constraints. JSON-shape acceptable; the agent reads this as its compile-time schema."
  - key: outputs
    heading: Outputs
    required: false
    search_weight: 10.0
    write_rules:
      - "Return shape. For mutation tools, include the typed payload (e.g. content_hash, commit_sha) the calling node will need. Read-only tools may omit this if the response is markdown."
  - key: preconditions
    heading: Preconditions
    required: false
    search_weight: 8.0
    write_rules:
      - "Bullet list of conditions that must hold for the tool to succeed. Examples: 'workspace must be a git repo', 'expected_hash must be current'."
  - key: error_codes
    heading: Error Codes
    required: false
    search_weight: 8.0
    write_rules:
      - "List of typed error codes the tool can emit (UPPER_SNAKE_CASE). Calling nodes attach falls_back_to edges keyed against these codes via the error_handling section."
  - key: notes
    heading: Notes
    required: false
    search_weight: 3.0
    catch_all: true
metadata_fields:
  - key: kind
    description: How the tool is invoked.
    field_type: string
    default_value: mcp_tool
    enum_values: [mcp_tool, shell_command, internal, sub_agent]
    filterable: equality
  - key: tool_name
    description: The actual name the agent uses to call the tool. For mcp_tool, the MCP tool name (e.g. memstead_create). For shell_command, the binary or subcommand. For sub_agent, the agent type identifier.
    field_type: string
  - key: idempotent
    description: Whether calling the tool twice with the same inputs is safe.
    field_type: boolean
    default_value: false
    filterable: equality
  - key: destructive
    description: Whether the tool mutates state irreversibly. Destructive tools deserve falls_back_to edges that don't retry without confirmation.
    field_type: boolean
    default_value: false
    filterable: equality
  - key: cost
    description: Relative cost hint. Used by the agent when multiple tools could satisfy a node — prefer cheap when correctness is equal.
    field_type: string
    default_value: low
    enum_values: [low, medium, high]
    filterable: equality
title_weight: 100.0
text_fields: [description, inputs, outputs, preconditions, error_codes, notes]
hierarchy_relationship: PART_OF
propagating_relationships: []
updatable_fields: [title, description, inputs, outputs, preconditions, error_codes, notes, kind, tool_name, idempotent, destructive, cost, tags]
health_required_fields: [description, inputs]
staleness_threshold_days: 180
write_rules:
  - "tool_name is the literal string the agent calls — no aliases, no prefixes invented for clarity. If the MCP tool is memstead_create, tool_name is 'memstead_create'."
  - "Destructive tools must list the typed error codes that signal partial failure. A destructive tool with no error_codes section is under-specified."
  - "Cross-program reuse: if many programs call the same MCP tool, author the tool entity once in a shared catalog mem and reference it across program mems via the references field. Don't copy."
