# Hand-maintained operation registry powering the Surface Parity Matrix.
#
# Each entry is a logical engine operation; the per-surface name slots
# resolve to the matching MCP tool, top-level CLI subcommand, UniFFI
# `Engine` method, and WASM JS-visible entry. A blank slot means the
# operation is not exposed on that surface. Surface entries the registry
# doesn't reference land in the matrix's "unaligned" sub-table — the
# matrix never silently drops a row when an extractor emits a name this
# file doesn't pin.

[[operation]]
name = "entity-read"
mcp = "memstead_entity"
cli = "entity"
uniffi = "get_entity"
wasm = "getEntity"

[[operation]]
name = "search"
mcp = "memstead_search"
cli = "search"
uniffi = "search"
wasm = "search"

[[operation]]
name = "list"
cli = "list"
uniffi = "list_entities"

[[operation]]
name = "relations-read"
cli = "relations"
uniffi = "get_relations"

[[operation]]
name = "context"
cli = "context"

[[operation]]
name = "overview"
mcp = "memstead_overview"
cli = "overview"
uniffi = "get_overview"

[[operation]]
name = "stats"
cli = "stats"
uniffi = "get_stats"

[[operation]]
name = "schema-describe"
mcp = "memstead_schema"
cli = "type"
# The app's schema browser reads the same wire shape the MCP tool
# serves (single-sourced through render::build_schema_payload).
uniffi = "schema_json"

[[operation]]
name = "health"
mcp = "memstead_health"
cli = "health"
uniffi = "get_health"
wasm = "health"

[[operation]]
name = "changes-since"
mcp = "memstead_changes_since"
cli = "changes"
uniffi = "changes_since"

[[operation]]
name = "reload"
mcp = "memstead_reload"
cli = "reload"
uniffi = "reload"

# Transport: deliberately CLI-only. Agents get no push/fetch primitive
# (security posture — moving a mem-repo off-machine is an owner
# decision), so the MCP slots stay blank on purpose.

[[operation]]
name = "fetch"
cli = "fetch"

[[operation]]
name = "pull"
cli = "pull"

[[operation]]
name = "push"
cli = "push"

[[operation]]
name = "branch-reset"
cli = "branch-reset"
# Human-surface rewind parity (macos-cockpit plan 04): the app exposes the
# guarded reset over UniFFI; deliberately absent from MCP (history
# rewriting stays off the agent wire). branch_reset_stranded_refs is the
# read-side confirmation companion.
uniffi = "branch_reset"

[[operation]]
name = "create"
mcp = "memstead_create"
cli = "create"

[[operation]]
name = "update"
mcp = "memstead_update"
cli = "update"

[[operation]]
name = "relate"
mcp = "memstead_relate"
cli = "relate"

[[operation]]
name = "delete"
mcp = "memstead_delete"
cli = "delete"

[[operation]]
name = "rename"
mcp = "memstead_rename"
cli = "rename"

[[operation]]
name = "mem-create"
mcp = "memstead_mem_create"
cli = "mem"

[[operation]]
name = "mem-delete"
mcp = "memstead_mem_delete"
cli = "mem"

[[operation]]
name = "mem-set-version"
mcp = "memstead_mem_set_version"
cli = "mem"

[[operation]]
name = "workspace-allow-create"
mcp = "memstead_workspace_allow_create"
cli = "workspace"

[[operation]]
name = "workspace-revoke-create"
mcp = "memstead_workspace_revoke_create"
cli = "workspace"

[[operation]]
name = "workspace-allow-delete"
mcp = "memstead_workspace_allow_delete"
cli = "workspace"

[[operation]]
name = "workspace-revoke-delete"
mcp = "memstead_workspace_revoke_delete"
cli = "workspace"

[[operation]]
name = "workspace-grant-cross-link"
mcp = "memstead_workspace_grant_cross_link"
cli = "workspace"

[[operation]]
name = "workspace-revoke-cross-link"
mcp = "memstead_workspace_revoke_cross_link"
cli = "workspace"

# Parse-time-drift recovery. Reaches both the CLI (`memstead recover`)
# and UniFFI (`Engine.apply_parse_recovery`, the first disk-mutating
# UniFFI method); no MCP tool (operator-initiated maintenance sweep).
[[operation]]
name = "parse-recovery"
cli = "recover"
uniffi = "apply_parse_recovery"

[[operation]]
name = "agent-notes"
uniffi = "agent_notes"

[[operation]]
name = "mem-head-sha"
uniffi = "mem_head_sha"

# WASM-specific operations. Browser thin-clients hydrate from a `.mem`
# snapshot, then receive incremental updates as `applyCommit` envelopes
# produced by the bridge's `/commits` endpoint. `mem-names` is a cheap
# diagnostic accessor on the WASM side; the other surfaces expose
# equivalent information via overview/health, so no parity entry there.

[[operation]]
name = "from-snapshot"
wasm = "fromSnapshot"

[[operation]]
name = "apply-commit"
wasm = "applyCommit"

[[operation]]
name = "mem-names"
wasm = "memNames"

[[operation]]
name = "set-panic-hook"
wasm = "setPanicHook"
