# Parse-time-drift recovery. Reaches both the CLI (`memstead recover`)
# and UniFFI (`Engine.apply_parse_recovery`, the first disk-mutating
# UniFFI method); no MCP tool (operator-initiated maintenance sweep).
[[operation]]
name = "parse-recovery"
cli = "recover"
uniffi = "apply_parse_recovery"

# Git-transport + branch-reset engine operations — public methods on
# `Engine` (`fetch`/`pull`/`push`/`branch_reset` in `engine/drift.rs`)
# that reach no programmatic surface yet: no MCP tool (deliberate), no
# wired CLI subcommand, no UniFFI binding. Pinned here so the matrix
# renders the gap as an all-`—` row rather than omitting the operations
# entirely (the `every-engine-operation-reaches-uniffi-and-cli`
# principle's witness must see them to flag the asymmetry).
[[operation]]
name = "fetch"

[[operation]]
name = "pull"

[[operation]]
name = "push"

[[operation]]
name = "branch-reset"

[[operation]]
name = "agent-notes"
uniffi = "agent_notes"

[[operation]]
name = "mem-head-sha"
uniffi = "mem_head_sha"

# WASM-specific operations. Browser thin-clients hydrate from a `.mem`
# snapshot, then receive incremental updates as `applyCommit` envelopes
# produced by the bridge's `/commits` endpoint. `mem-names` is a cheap
# diagnostic accessor on the WASM side; the other surfaces expose
# equivalent information via overview/health, so no parity entry there.

[[operation]]
name = "from-snapshot"
wasm = "fromSnapshot"

[[operation]]
name = "apply-commit"
wasm = "applyCommit"

[[operation]]
name = "mem-names"
wasm = "memNames"

[[operation]]
name = "set-panic-hook"
wasm = "setPanicHook"
