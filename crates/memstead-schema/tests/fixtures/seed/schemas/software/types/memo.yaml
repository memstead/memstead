# yaml-language-server: $schema=../../../../engine/crates/memstead-schema/generated/type-definition.schema.json

name: memo
description: |
  Lightweight reasoning — an observation, lesson, plan, goal, or
  constraint that isn't yet weighty enough for a full ADR. The
  scratchpad layer of a software-project knowledge graph.
when_to_use: |
  Use when recording reasoning without rejected alternatives — a lesson
  from a near-miss, a plan that isn't yet a commitment, an observation
  from an experiment. The defining test: is this reasoning that might
  harden into a decision later, but isn't one yet? If alternatives
  accumulate and the content hardens into a durable choice, migrate to
  a `decision`.
boundaries:
  - Not a formal design decision with rejected alternatives — use `decision` (or migrate this memo there).
  - Not current-state documentation — use `spec`.
  - Not a normative commitment — use `requirement`.
  - Not a project-wide rule — use `principle`.
  - Not a production failure — use `incident`.
system_message: |
  Memos capture reasoning. Each has Claim, Context, and optional
  Substance/Alternatives/Outcome. Status is binary (active/closed) —
  use SUPERSEDES for replacement, not status. Tags are mandatory: at
  least one of observation / lesson / plan / goal / constraint. If the
  memo accumulates rejected alternatives, migrate it to a `decision`.
sections:
  - key: claim
    heading: Claim
    required: true
    search_weight: 40.0
    write_rules:
      - "One sentence. Core assertion, goal, proposal, or finding. Must work standalone in search results."
  - key: context
    heading: Context
    required: true
    search_weight: 20.0
    write_rules:
      - "Bullet points. Situation, forces, trigger. Enough for a future agent to judge relevance."
  - key: substance
    heading: Substance
    required: false
    search_weight: 5.0
    catch_all: true
    write_rules:
      - "Full reasoning, evidence, analysis. Structured: bullet lists, tables over prose."
  - key: alternatives
    heading: Alternatives
    required: false
    search_weight: 5.0
    write_rules:
      - "What else was considered, why rejected. Bullet format: option, then rejection reason."
      - "If the memo accumulates substantial alternatives, migrate it to a `decision` entity."
  - key: outcome
    heading: Outcome
    required: false
    search_weight: 3.0
    write_rules:
      - "Results, consequences, lessons. Append-friendly — add entries, don't rewrite existing ones."
metadata_fields:
  - key: status
    description: Lifecycle state — active (still live) or closed (resolved).
    field_type: string
    default_value: active
    enum_values: [active, closed]
    filterable: equality
title_weight: 100.0
text_fields: [claim, context, substance, alternatives, outcome]
hierarchy_relationship: PART_OF
edge_weight_overrides:
  DERIVED_FROM: 2.0
propagating_relationships: [DERIVED_FROM, MOTIVATED_BY]
updatable_fields: [title, claim, context, substance, alternatives, outcome, status, tags]
health_required_fields: [claim, context]
staleness_threshold_days: 90
write_rules:
  - "Memos capture reasoning — not current state, not formal ADRs."
  - "Status: binary. active = still live, closed = resolved. Closure reason belongs in Outcome, not status."
  - "Supersession: express via SUPERSEDES, not status. 'Closed' means resolved, not replaced."
  - "Tags: every memo MUST include at least one of: observation, lesson, plan, goal, constraint. Free vocabulary beyond that. Note that `decision` is a dedicated type — do not use it as a memo tag."
  - "Outcome is append-friendly — add entries, don't rewrite. Records what happened over time."
  - "If a memo accumulates rejected alternatives and hardens into a durable choice, migrate the content to a `decision` entity and supersede the memo."
