# yaml-language-server: $schema=../../../generated/schema-manifest.schema.json
name: default
version: 1.0.0
description: |
  Built-in memstead schema covering ten knowledge-type kinds: spec, memo, assertion,
  concept, inquiry, model, narrative, perspective, principle, process. Spans
  spec-authoring and knowledge-capture in a single relationship vocabulary.
when_to_use: |
  Use when you want a general-purpose knowledge graph without authoring a
  custom schema. Cover most specification and knowledge-capture workloads.
  Author a dedicated schema instead when the domain vocabulary is
  specialized enough that generic types would hurt agent judgement.
system_message: |
  You are working in a knowledge graph using the default memstead schema. The
  schema contains 10 entity types spanning spec-authoring (spec, memo) and
  knowledge-capture (concept, assertion, inquiry, perspective, principle,
  narrative, model, process).

  Prefer specific types over generic ones — an assertion is better than a memo
  for a factual claim. Link aggressively: every entity should have at least
  two outgoing edges. Use declared relationships only; this schema is strict.

types:
  - spec
  - memo
  - assertion
  - concept
  - inquiry
  - model
  - narrative
  - perspective
  - principle
  - process

relationships:
  mode: strict
  definitions:
    - name: PART_OF
      description: Hierarchical containment — the source is structurally part of the target and meaningless without it.
      when_to_use: Taxonomy. Parent owns the child as a structural part. Pure graph edge — files stay flat at the mem root. Not for logical dependency (use DEPENDS_ON) or soft reference (use REFERENCES).
      default_weight: 3.0
      acyclic: true
    - name: REFERENCES
      description: Soft reference from the source to the target without ownership or dependency.
      when_to_use: Mentioning, pointing at, citing. Emitted automatically from inline wiki-links — avoid authoring by hand.
      default_weight: 0.5
    - name: DEPENDS_ON
      description: The source requires the target to exist or complete first.
      when_to_use: Logical dependency where removing the target breaks the source. Not hierarchy (use PART_OF).
      default_weight: 2.0
      acyclic: true
    - name: IMPLEMENTS
      description: The source realizes or fulfills the target specification.
      when_to_use: Concrete implementations pointing at the abstract spec they satisfy.
      default_weight: 2.0
      acyclic: true
    - name: DEFINES
      description: The source defines the target concept or term.
      default_weight: 1.5
      acyclic: true
    - name: DEFINED_BY
      description: The source is defined by the target (inverse of DEFINES).
      default_weight: 1.5
      acyclic: true
    - name: USES
      description: The source makes use of the target without depending on it.
      when_to_use: Consumption without tight coupling — compare DEPENDS_ON for hard requirements.
      default_weight: 1.0
    - name: CLASSIFIES
      description: The source classifies or categorizes the target.
      default_weight: 1.0
      acyclic: true
    - name: STORES
      description: The source stores the target data or content.
      default_weight: 1.0
    - name: DERIVED_FROM
      description: The source is derived from, or based upon, the target.
      when_to_use: Prior art, source material, inspiration that concretely shaped the source.
      default_weight: 1.5
      acyclic: true
    - name: MOTIVATED_BY
      description: The target motivated the creation or change described by the source.
      default_weight: 2.0
      acyclic: true
    - name: SUPERSEDES
      description: The source replaces the target — the target is no longer current.
      when_to_use: Versioning and replacement. Keep the old entity for history; link the new one via SUPERSEDES.
      default_weight: 1.5
      acyclic: true
    - name: ENABLES
      description: The source enables the target to happen or exist.
      default_weight: 1.0
      acyclic: true
    - name: BLOCKS
      description: The source blocks the target from happening or progressing.
      default_weight: 1.0
      acyclic: true
    - name: SUPPORTS
      description: The source provides evidence or reasoning that supports the target claim.
      default_weight: 2.5
    - name: CONTRADICTS
      description: The source contradicts or disputes the target claim.
      default_weight: 2.5
    - name: GENERALIZES
      description: The source is a broader, more abstract form of the target.
      default_weight: 2.0
      acyclic: true
    - name: SPECIALIZES
      description: The source is a narrower, more concrete form of the target.
      default_weight: 2.0
      acyclic: true
    - name: CONTRASTS_WITH
      description: The source is defined partly by its contrast with the target — easily confused neighbors.
      default_weight: 1.5
    - name: MOTIVATES
      description: The source motivates or drives the target.
      default_weight: 1.5
      acyclic: true
    - name: INFORMED_BY
      description: The source is informed by the target — partial input, not a hard dependency.
      default_weight: 1.0
    - name: EXPLAINS
      description: The source explains the phenomenon or behavior of the target.
      default_weight: 2.0
    - name: PREDICTS
      description: The source predicts the behavior of the target.
      default_weight: 1.5
    - name: PRECEDED_BY
      description: The source is preceded in time by the target.
      default_weight: 2.0
      acyclic: true
    - name: FOLLOWED_BY
      description: The source is followed in time by the target.
      default_weight: 2.0
      acyclic: true
    - name: CAUSED
      description: The source caused the target (causal, not merely temporal).
      default_weight: 1.5
      acyclic: true
    - name: VALIDATES
      description: The source validates the target claim, pattern, or principle.
      default_weight: 1.5
    - name: AGREES_WITH
      description: The source perspective agrees with the target perspective.
      default_weight: 2.0
    - name: DISAGREES_WITH
      description: The source perspective disagrees with the target perspective.
      default_weight: 2.5
    - name: INTERPRETS
      description: The source interprets or analyzes the target.
      default_weight: 2.0
    - name: EXTENDS
      description: The source extends the target with additional reasoning or scope.
      default_weight: 1.5
    - name: GOVERNS
      description: The source principle governs or constrains the target.
      default_weight: 2.5
      acyclic: true
    - name: CONSTRAINS
      description: The source constrains the permissible states of the target.
      default_weight: 2.0
      acyclic: true
    - name: OVERRIDES
      description: The source overrides the target principle in overlapping scope.
      default_weight: 1.5
      acyclic: true
    - name: REQUIRES
      description: The source process requires the target to have happened first.
      default_weight: 2.5
      acyclic: true
    - name: PRODUCES
      description: The source process produces the target as an output.
      default_weight: 2.0
      acyclic: true
    - name: TRIGGERS
      description: Completing the source triggers the target.
      default_weight: 2.0
      acyclic: true
    - name: _default
      description: Fallback weight for any relationship not otherwise specified.
      default_weight: 1.0

# Body wiki-links `[[target]]` auto-emit as REFERENCES relations via the
# alias-synthesis pass. Explicit `memstead_relate type=REFERENCES` is
# forbidden: the loader forces `manual_authoring: forbidden` on this pointer
# rel-type, so the body-link channel is the only path to a REFERENCES edge.
alias_target_rel_type: REFERENCES

community:
  resolution: 1.0
  seed: 42
